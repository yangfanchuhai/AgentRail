server:
  port: 8081

spring:
  application:
    name: agentrail-api

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/agentrail_api}
    username: ${DATABASE_USERNAME:agentrail}
    password: ${DATABASE_PASSWORD:agentrail}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

logging:
  level:
    root: INFO
    com.agentrail: DEBUG
    org.springframework.security: DEBUG
    org.jooq: DEBUG
