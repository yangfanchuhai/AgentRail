server:
  port: 8082

spring:
  application:
    name: agentrail-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/agentrail}
    username: ${DATABASE_USERNAME:agentrail}
    password: ${DATABASE_PASSWORD:agentrail}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# Temporal configuration
temporal:
  connection:
    target: ${TEMPORAL_TARGET:localhost:7233}
    namespace: ${TEMPORAL_NAMESPACE:agentrail}
    enable-https: false
  worker:
    task-queue: ${TEMPORAL_TASK_QUEUE:agentrail-runs}

logging:
  level:
    root: INFO
    com.agentrail: DEBUG
    io.temporal: INFO
