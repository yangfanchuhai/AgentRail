version: "3.9"

# ============================================================
# AgentRail 本地开发环境
# Postgres 16 + pgvector | Temporal Server + Admin Tools | MinIO
# + agentrail-api (控制面) | agentrail-service (数据面) | worker (执行面)
# ============================================================

x-common-env: &common-env
  POSTGRES_USER: ${POSTGRES_USER:-agentrail}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentrail_dev}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432

services:
  # ----------------------------------------------------------
  # PostgreSQL 16 + pgvector
  # ----------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agentrail-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentrail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentrail_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentrail}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - agentrail

  # ----------------------------------------------------------
  # Temporal Server (auto-setup)
  # ----------------------------------------------------------
  temporal:
    image: temporalio/auto-setup:1.26.2
    container_name: agentrail-temporal
    restart: unless-stopped
    ports:
      - "${TEMPORAL_GRPC_PORT:-7233}:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-agentrail}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-agentrail_dev}
      - POSTGRES_SEEDS=postgres
      - TEMPORAL_CLI_ADDRESS=temporal:7233
      - ENABLE_UI=true
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agentrail

  # ----------------------------------------------------------
  # Temporal Web UI
  # ----------------------------------------------------------
  temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: agentrail-temporal-ui
    restart: unless-stopped
    ports:
      - "${TEMPORAL_UI_PORT:-8080}:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=*
    depends_on:
      - temporal
    networks:
      - agentrail

  # ----------------------------------------------------------
  # Temporal Admin Tools
  # ----------------------------------------------------------
  temporal-admin-tools:
    image: temporalio/admin-tools:1.26.2
    container_name: agentrail-temporal-admin
    restart: "no"
    environment:
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    depends_on:
      - temporal
    entrypoint: ["tail", "-f", "/dev/null"]
    networks:
      - agentrail

  # ----------------------------------------------------------
  # MinIO (S3-compatible 对象存储)
  # ----------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: agentrail-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - agentrail

  # ----------------------------------------------------------
  # MinIO 初始化 — 创建默认 bucket
  # ----------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2025-04-22T22-24-06Z
    container_name: agentrail-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123} &&
      if ! mc ls local/${MINIO_BUCKET:-agentrail} > /dev/null 2>&1; then
        mc mb local/${MINIO_BUCKET:-agentrail} &&
        echo 'Bucket ${MINIO_BUCKET:-agentrail} created';
      else
        echo 'Bucket ${MINIO_BUCKET:-agentrail} already exists';
      fi
      "
    networks:
      - agentrail

  # ==========================================================
  # AgentRail Application Services
  # ==========================================================

  # ----------------------------------------------------------
  # agentrail-api — 控制面 (CRUD API, port 8081)
  # ----------------------------------------------------------
  agentrail-api:
    build:
      context: ..
      dockerfile: agentrail-api/Dockerfile
    container_name: agentrail-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8081}:8081"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/agentrail
      DATABASE_USERNAME: ${POSTGRES_USER:-agentrail}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-agentrail_dev}
      SERVER_PORT: "8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - agentrail

  # ----------------------------------------------------------
  # agentrail-service — 数据面 (Run API + Temporal Client, port 8082)
  # ----------------------------------------------------------
  agentrail-service:
    build:
      context: ..
      dockerfile: agentrail-service/Dockerfile
    container_name: agentrail-service
    restart: unless-stopped
    ports:
      - "${SERVICE_PORT:-8082}:8082"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/agentrail
      DATABASE_USERNAME: ${POSTGRES_USER:-agentrail}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-agentrail_dev}
      SERVER_PORT: "8082"
      TEMPORAL_TARGET: temporal:7233
      TEMPORAL_NAMESPACE: agentrail
      TEMPORAL_TASK_QUEUE: agentrail-runs
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
      agentrail-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - agentrail

  # ----------------------------------------------------------
  # agentrail-worker — 执行面 (Python Temporal Worker)
  # ----------------------------------------------------------
  agentrail-worker:
    build:
      context: ../agentrail-worker
      dockerfile: Dockerfile
    container_name: agentrail-worker
    restart: unless-stopped
    environment:
      TEMPORAL_HOST: temporal:7233
      TEMPORAL_NAMESPACE: agentrail
      TEMPORAL_TASK_QUEUE: agentrail-runs
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agentrail}:${POSTGRES_PASSWORD:-agentrail_dev}@postgres:5432/agentrail
      AGENTRAIL_SERVICE_URL: http://agentrail-service:8082
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
      agentrail-service:
        condition: service_healthy
    networks:
      - agentrail

# ===========================================================
# Volumes
# ===========================================================
volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

# ===========================================================
# Network
# ===========================================================
networks:
  agentrail:
    name: agentrail
    driver: bridge
