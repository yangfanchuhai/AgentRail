version: "3.9"

# ============================================================
# AgentRail 本地开发环境
# Postgres 16 + pgvector | Temporal Server + Admin Tools | MinIO
# ============================================================

x-common-env: &common-env
  POSTGRES_USER: ${POSTGRES_USER:-agentrail}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentrail_dev}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432

services:
  # ----------------------------------------------------------
  # PostgreSQL 16 + pgvector
  # ----------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agentrail-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentrail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentrail_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentrail}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - agentrail

  # ----------------------------------------------------------
  # Temporal Server (auto-setup)
  # 持久化使用同一个 Postgres，数据库名: temporal / temporal_visibility
  # ----------------------------------------------------------
  temporal:
    image: temporalio/auto-setup:1.26.2
    container_name: agentrail-temporal
    restart: unless-stopped
    ports:
      - "${TEMPORAL_GRPC_PORT:-7233}:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-agentrail}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-agentrail_dev}
      - POSTGRES_SEEDS=postgres
      - TEMPORAL_CLI_ADDRESS=temporal:7233
      - ENABLE_UI=true
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agentrail

  # ----------------------------------------------------------
  # Temporal Web UI
  # ----------------------------------------------------------
  temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: agentrail-temporal-ui
    restart: unless-stopped
    ports:
      - "${TEMPORAL_UI_PORT:-8080}:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=*
    depends_on:
      - temporal
    networks:
      - agentrail

  # ----------------------------------------------------------
  # Temporal Admin Tools (tctl / temporal CLI)
  # ----------------------------------------------------------
  temporal-admin-tools:
    image: temporalio/admin-tools:1.26.2
    container_name: agentrail-temporal-admin
    restart: "no"
    environment:
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    depends_on:
      - temporal
    entrypoint: ["tail", "-f", "/dev/null"]   # 保持容器运行以便 exec
    networks:
      - agentrail

  # ----------------------------------------------------------
  # MinIO (S3-compatible 对象存储)
  # 默认 bucket: agentrail
  # ----------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: agentrail-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - agentrail

  # ----------------------------------------------------------
  # MinIO 初始化 — 创建默认 bucket
  # ----------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2025-04-22T22-24-06Z
    container_name: agentrail-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123} &&
      if ! mc ls local/${MINIO_BUCKET:-agentrail} > /dev/null 2>&1; then
        mc mb local/${MINIO_BUCKET:-agentrail} &&
        echo 'Bucket ${MINIO_BUCKET:-agentrail} created';
      else
        echo 'Bucket ${MINIO_BUCKET:-agentrail} already exists';
      fi
      "
    networks:
      - agentrail

# ===========================================================
# Volumes
# ===========================================================
volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

# ===========================================================
# Network
# ===========================================================
networks:
  agentrail:
    name: agentrail
    driver: bridge
